<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>1049HN</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial,Helvetica,sans-serif;

    background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
    background-size:300% 300%;

    animation:backgroundMove 10s infinite alternate;

    color:white;

}

@keyframes backgroundMove{

    from{background-position:left;}
    to{background-position:right;}

}

.card{

    width:420px;
    max-width:90%;

    padding:45px;

    border-radius:25px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.2);

    text-align:center;

    box-shadow:0 20px 40px rgba(0,0,0,.4);

    animation:fade .8s ease;

}

@keyframes fade{

    from{

        opacity:0;
        transform:translateY(40px);

    }

    to{

        opacity:1;
        transform:translateY(0);

    }

}

h1{

    font-size:42px;
    margin-bottom:20px;

}

p{

    color:#d1d5db;
    line-height:1.8;
    margin-bottom:35px;

}

.button{

    display:block;

    width:100%;

    padding:15px;

    margin-top:15px;

    border:none;

    border-radius:12px;

    text-decoration:none;

    color:white;

    font-size:17px;

    cursor:pointer;

    transition:.3s;

}

.instagram{

    background:#E1306C;

}

.website{

    background:#2563eb;

}

.button:hover{

    transform:translateY(-4px);

    box-shadow:0 15px 30px rgba(0,0,0,.35);

}

.footer{

    margin-top:35px;

    font-size:13px;

    color:#94a3b8;

}

</style>

</head>

<body>

<div class="card">

<h1>👋 Merhaba</h1>

<p>

QR kodu başarıyla okuttunuz.

Beni ziyaret ettiğiniz için teşekkür ederim.

Instagram hesabıma göz atmak için aşağıdaki butona tıklayabilirsiniz.

</p>

<a class="button instagram"
href="https://instagram.com/hakanoz1049">

Instagram'a Git

</a>

<button class="button website" onclick="mesaj()">

Mesaj Göster

</button>

<div class="footer">

© 2026 1049HN

</div>

</div>

<script>

function mesaj(){

    alert("Ziyaretiniz için teşekkür ederim 😊");

}

</script>

</body>
</html>
